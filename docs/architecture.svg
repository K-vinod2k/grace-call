<svg viewBox="0 0 920 600" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="GraceCall architecture">
<title>GraceCall — Architecture</title>
<desc>Three tiers: Microsoft 365 and Copilot Studio (Power Automate trigger, Copilot Studio agent grounded by Foundry IQ, Microsoft 365 Copilot); the GraceCall Azure service in this repo (policy engine, ACS Call Automation, Azure Voice Live, policy-safe tools); and the customer (live phone call and SMS).</desc>
<rect x="0" y="0" width="920" height="600" fill="#ffffff"/>
<defs>
<marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 z" fill="#5A5A66"/></marker>
</defs>

<text x="40" y="30" font-size="20" font-weight="700" fill="#1B1B22">GraceCall — Architecture</text>
<text x="40" y="50" font-size="12" fill="#6E6E78">Microsoft Agents League · Enterprise Agents track · the agent calls the customer</text>

<!-- TIER 1 -->
<text x="40" y="84" font-size="11" font-weight="700" letter-spacing="1" fill="#0B5CAB">MICROSOFT 365 + COPILOT STUDIO</text>
<rect x="40" y="96" width="180" height="72" rx="8" fill="#E3F0FB" stroke="#0B5CAB" stroke-width="1.5"/>
<text x="130" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#0B3D6B">Power Automate</text>
<text x="130" y="146" text-anchor="middle" font-size="11" fill="#334455">trigger ~1h overdue</text>

<rect x="300" y="90" width="240" height="84" rx="8" fill="#E3F0FB" stroke="#0B5CAB" stroke-width="1.5"/>
<text x="420" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#0B3D6B">Copilot Studio Agent</text>
<rect x="318" y="128" width="204" height="30" rx="6" fill="#FFF3C4" stroke="#B7950B" stroke-width="1.2"/>
<text x="420" y="148" text-anchor="middle" font-size="11" fill="#6B5300">Foundry IQ — policy knowledge</text>

<rect x="620" y="96" width="180" height="72" rx="8" fill="#E3F0FB" stroke="#0B5CAB" stroke-width="1.5"/>
<text x="710" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#0B3D6B">Microsoft 365 Copilot</text>
<text x="710" y="146" text-anchor="middle" font-size="11" fill="#334455">ops queries</text>

<!-- TIER 2 -->
<text x="40" y="248" font-size="11" font-weight="700" letter-spacing="1" fill="#137C3A">GRACECALL SERVICE — THIS REPO</text>
<rect x="40" y="260" width="180" height="72" rx="8" fill="#E2F3EA" stroke="#137C3A" stroke-width="1.5"/>
<text x="130" y="290" text-anchor="middle" font-size="13" font-weight="600" fill="#0B5227">Policy Engine</text>
<text x="130" y="310" text-anchor="middle" font-size="11" fill="#224433">recover / extend / charge</text>

<rect x="250" y="260" width="170" height="72" rx="8" fill="#E2F3EA" stroke="#137C3A" stroke-width="1.5"/>
<text x="335" y="290" text-anchor="middle" font-size="13" font-weight="600" fill="#0B5227">ACS Call Automation</text>
<text x="335" y="310" text-anchor="middle" font-size="11" fill="#224433">outbound PSTN</text>

<rect x="460" y="260" width="170" height="72" rx="8" fill="#E2F3EA" stroke="#137C3A" stroke-width="1.5"/>
<text x="545" y="290" text-anchor="middle" font-size="13" font-weight="600" fill="#0B5227">Azure Voice Live</text>
<text x="545" y="310" text-anchor="middle" font-size="11" fill="#224433">gpt-realtime · barge-in</text>

<rect x="670" y="260" width="180" height="72" rx="8" fill="#E2F3EA" stroke="#137C3A" stroke-width="1.5"/>
<text x="760" y="290" text-anchor="middle" font-size="13" font-weight="600" fill="#0B5227">Policy-safe Tools</text>
<text x="760" y="310" text-anchor="middle" font-size="11" fill="#224433">limits enforced in code</text>

<!-- TIER 3 -->
<text x="40" y="430" font-size="11" font-weight="700" letter-spacing="1" fill="#6E6E78">CUSTOMER</text>
<rect x="250" y="442" width="170" height="72" rx="8" fill="#EFEFF2" stroke="#6E6E78" stroke-width="1.5"/>
<text x="335" y="472" text-anchor="middle" font-size="13" font-weight="600" fill="#3A3A42">Customer Phone</text>
<text x="335" y="492" text-anchor="middle" font-size="11" fill="#555555">live PSTN conversation</text>

<rect x="460" y="442" width="170" height="72" rx="8" fill="#EFEFF2" stroke="#6E6E78" stroke-width="1.5"/>
<text x="545" y="472" text-anchor="middle" font-size="13" font-weight="600" fill="#3A3A42">SMS</text>
<text x="545" y="492" text-anchor="middle" font-size="11" fill="#555555">secure pay link / confirm</text>

<!-- ARROWS -->
<line x1="222" y1="132" x2="296" y2="132" stroke="#5A5A66" stroke-width="1.6" marker-end="url(#arw)"/>
<path d="M420,176 V212 H130 V256" fill="none" stroke="#5A5A66" stroke-width="1.6" marker-end="url(#arw)"/>
<rect x="214" y="196" width="142" height="18" rx="3" fill="#ffffff"/>
<text x="285" y="209" text-anchor="middle" font-size="11" fill="#5A5A66">TriggerOverdueCall action</text>

<line x1="222" y1="296" x2="248" y2="296" stroke="#5A5A66" stroke-width="1.6" marker-end="url(#arw)"/>
<line x1="421" y1="296" x2="458" y2="296" stroke="#5A5A66" stroke-width="1.6" marker-start="url(#arw)" marker-end="url(#arw)"/>
<text x="440" y="286" text-anchor="middle" font-size="9.5" fill="#5A5A66">media</text>
<line x1="631" y1="296" x2="668" y2="296" stroke="#5A5A66" stroke-width="1.6" marker-end="url(#arw)"/>

<line x1="335" y1="334" x2="335" y2="440" stroke="#5A5A66" stroke-width="1.6" marker-end="url(#arw)"/>
<text x="343" y="392" font-size="11" fill="#5A5A66">PSTN voice</text>

<path d="M740,334 L562,440" fill="none" stroke="#5A5A66" stroke-width="1.6" marker-end="url(#arw)"/>
<text x="664" y="398" text-anchor="middle" font-size="11" fill="#5A5A66">pay link</text>

<path d="M712,258 V174" fill="none" stroke="#5A5A66" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arw)"/>
<rect x="650" y="206" width="150" height="18" rx="3" fill="#ffffff"/>
<text x="725" y="219" text-anchor="middle" font-size="11" fill="#5A5A66">outcome + transcript</text>

<!-- LEGEND -->
<rect x="40" y="540" width="14" height="14" rx="3" fill="#E3F0FB" stroke="#0B5CAB"/>
<text x="60" y="551" font-size="11" fill="#3A3A42">Microsoft platform</text>
<rect x="190" y="540" width="14" height="14" rx="3" fill="#E2F3EA" stroke="#137C3A"/>
<text x="210" y="551" font-size="11" fill="#3A3A42">GraceCall service (this repo)</text>
<rect x="410" y="540" width="14" height="14" rx="3" fill="#EFEFF2" stroke="#6E6E78"/>
<text x="430" y="551" font-size="11" fill="#3A3A42">Customer</text>

<text x="40" y="578" font-size="11" fill="#6E6E78">Responsible AI built in: AI disclosure · do-not-call · escalate to human · no card-by-voice · charge &amp; attempt caps</text>
</svg>
