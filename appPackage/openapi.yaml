openapi: 3.0.1
info:
  title: GraceCall Telephony Tool
  description: >
    Places an outbound rental-overage courtesy call and runs the voice conversation.
    Imported into Copilot Studio as a custom connector, then added to the GraceCall agent
    as an action. The agent calls this when a rental is overdue; the response carries the
    reasoning (objective + rationale) so it is visible inside the agent and M365 Copilot.
  version: "1.0.0"
servers:
  - url: https://ninth-douche-disfigure.ngrok-free.dev
    description: ngrok tunnel to local GraceCall service on :8080
paths:
  /trigger-call:
    post:
      operationId: TriggerOverdueCall
      summary: Place an outbound overage call for a rental
      description: Looks up the rental, decides the objective per policy, and places the call.
      security:
        - GraceCallKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rentalId]
              properties:
                rentalId:
                  type: string
                  description: The rental to call about, e.g. RNT-1001.
      responses:
        "200":
          description: Decision + call status
          content:
            application/json:
              schema:
                type: object
                properties:
                  rentalId: { type: string }
                  objective:
                    type: string
                    enum: [recover, extend, charge, escalate]
                  rationale: { type: string, description: Why the agent is calling / its plan. }
                  overageOwedUSD: { type: number }
                  placed: { type: boolean }
                  callConnectionId: { type: string }
        "401": { description: Missing or wrong X-GraceCall-Key }
        "404": { description: Unknown rental }
components:
  securitySchemes:
    GraceCallKey:
      type: apiKey
      in: header
      name: X-GraceCall-Key
